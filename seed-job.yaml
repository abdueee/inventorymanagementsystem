apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-seed
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: prisma-seed
          image: joeria/trackventory-migrate:v2
          imagePullPolicy: Always
          command: ["npm", "run", "seed"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
